<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AgroVision | Smart Agriculture Dashboard</title>

  <!-- Fonts & Chart.js -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="/static/styles.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌾</text></svg>">
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-animated"></div>

  <!-- Top App Bar -->
  <header class="app-bar" id="appBar">
    <div class="app-bar-left">
      <span class="logo-icon">🌾</span>
      <div class="farm-info">
        <h1 id="topFarmName">Green Valley</h1>
        <span class="user-name" id="topUserName">Loading...</span>
      </div>
    </div>
    <div class="app-bar-right">
      <button class="icon-btn theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
      <button class="icon-btn notification-btn">
        🔔<span class="badge">2</span>
      </button>
      <button class="icon-btn logout-btn" onclick="logout()" title="Logout">🚪</button>
    </div>
  </header>

  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <nav class="side-nav">
      <a href="#/dashboard" class="nav-item active" data-page="/dashboard">
        <span class="nav-icon">📊</span><span class="nav-text">Dashboard</span>
      </a>
      <a href="#/weather" class="nav-item" data-page="/weather">
        <span class="nav-icon">🌤️</span><span class="nav-text">Weather</span>
      </a>
      <a href="#/farm-health" class="nav-item" data-page="/farm-health">
        <span class="nav-icon">🌱</span><span class="nav-text">Farm Health</span>
      </a>
      <a href="#/tasks" class="nav-item" data-page="/tasks">
        <span class="nav-icon">📋</span><span class="nav-text">Tasks</span>
      </a>
      <a href="#/detect" class="nav-item" data-page="/detect">
        <span class="nav-icon">📷</span><span class="nav-text">Scan Crop</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content" id="app-content">
    <!-- SPA Content injected here -->
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav" id="bottomNav">
    <a href="#/dashboard" class="nav-item active" data-page="/dashboard">
      <span class="nav-icon">📊</span><span class="nav-text">Home</span>
    </a>
    <a href="#/weather" class="nav-item" data-page="/weather">
      <span class="nav-icon">🌤️</span><span class="nav-text">Weather</span>
    </a>
    <a href="#/detect" class="nav-item scan-btn" data-page="/detect">
      <div class="scan-circle">📷</div>
    </a>
    <a href="#/farm-health" class="nav-item" data-page="/farm-health">
      <span class="nav-icon">🌱</span><span class="nav-text">Health</span>
    </a>
    <a href="#/tasks" class="nav-item" data-page="/tasks">
      <span class="nav-icon">📋</span><span class="nav-text">Tasks</span>
    </a>
  </nav>

  <!-- AI Chatbot Widget -->
  <button class="chatbot-fab" id="chatbotFab">🤖</button>

  <div class="chatbot-panel glass" id="chatbotPanel">
    <div class="chat-header">
      <div class="chat-title">
        <span>🤖</span>
        <div><strong>AgriBot</strong>
          <div class="chat-status">Online</div>
        </div>
      </div>
      <button class="icon-btn" id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-suggestions">
      <button class="chat-chip">Will it rain today?</button>
      <button class="chat-chip">Organic treatment for Blight</button>
      <button class="chat-chip">What is my next task?</button>
    </div>
    <div class="chat-input-area">
      <select id="chatLang" class="lang-select">
        <option value="en">English</option>
        <option value="hi">हिंदी</option>
      </select>
      <button class="icon-btn voice-btn" id="voiceChatBtn">🎤</button>
      <input type="text" id="chatInput" placeholder="Ask anything...">
      <button class="icon-btn send-btn" id="sendChatBtn">➤</button>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/router.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/weather.js"></script>
  <script src="/static/js/farm-health.js"></script>
  <script src="/static/js/tasks.js"></script>
  <script src="/static/js/disease-detect.js"></script>
  <script src="/static/js/chatbot.js"></script>

  <script>
    // App Initialization
    document.addEventListener('DOMContentLoaded', () => {
      // Setup Theme
      const savedTheme = localStorage.getItem('farmguard-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);

      window.toggleTheme = () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('farmguard-theme', isDark ? 'light' : 'dark');
      };

      // Register Routes
      Router.register('/login', '/static/pages/login.html', () => {
        document.getElementById('appBar').style.display = 'none';
        document.getElementById('sidebar').style.display = 'none';
        document.getElementById('bottomNav').style.display = 'none';
        document.getElementById('chatbotFab').style.display = 'none';
        initLoginPage();
      });

      Router.register('/dashboard', '/static/pages/dashboard.html', () => {
        showAppUI(); initDashboard();
      });

      Router.register('/weather', '/static/pages/weather.html', () => {
        showAppUI(); initWeather();
      });

      Router.register('/farm-health', '/static/pages/farm-health.html', () => {
        showAppUI(); initFarmHealth();
      });

      Router.register('/tasks', '/static/pages/tasks.html', () => {
        showAppUI(); initTasks();
      });

      Router.register('/detect', '/static/pages/disease-detect.html', () => {
        showAppUI(); initDetect();
      });

      function showAppUI() {
        document.getElementById('appBar').style.display = 'flex';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('bottomNav').style.display = 'flex';
        document.getElementById('chatbotFab').style.display = 'flex';

        const user = getUser();
        if (user) {
          document.getElementById('topFarmName').textContent = user.farm_name || 'My Farm';
          document.getElementById('topUserName').textContent = user.phone || 'Farmer';
        }
      }

      // Initialize global modules
      initChatbot();

      // Start Router
      Router.init('app-content');
    });
  </script>
</body>

</html>
